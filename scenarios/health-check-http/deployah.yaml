apiVersion: v1-alpha.2
project: health-check-http
components:
  api:
    image: my-app:1.0.0
    port: 8080
    resourcePreset: small
    environments: [dev]
    health:
      ready:
        path: /health
      alive:
        path: /livez
        interval: 10s
        restartAfter: 60s
environments:
  dev: {}
