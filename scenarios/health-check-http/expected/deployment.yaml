apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-check-http-dev
  labels:
    deployah.dev/project: health-check-http
    deployah.dev/component: api
    deployah.dev/environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      deployah.dev/project: health-check-http
      deployah.dev/component: api
      deployah.dev/environment: dev
  template:
    metadata:
      labels:
        deployah.dev/project: health-check-http
        deployah.dev/component: api
        deployah.dev/environment: dev
    spec:
      containers:
      - name: api
        image: my-app:1.0.0
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 5
          failureThreshold: 36
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 5
          failureThreshold: 3
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
