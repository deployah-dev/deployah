apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app.kubernetes.io/instance: command-args-resources-production
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: processor
        deployah.dev/component: processor
        deployah.dev/environment: production
        deployah.dev/project: command-args-resources
        helm.sh/chart: processor-0.1.0
    name: command-args-resources-production-processor
    namespace: default
spec:
    replicas: 1
    revisionHistoryLimit: 10
    selector:
        matchLabels:
            app.kubernetes.io/instance: command-args-resources-production
            app.kubernetes.io/name: processor
    strategy:
        type: RollingUpdate
    template:
        metadata:
            annotations: null
            labels:
                app.kubernetes.io/instance: command-args-resources-production
                app.kubernetes.io/managed-by: Helm
                app.kubernetes.io/name: processor
                deployah.dev/component: processor
                deployah.dev/environment: production
                deployah.dev/project: command-args-resources
                helm.sh/chart: processor-0.1.0
        spec:
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - podAffinityTerm:
                            labelSelector:
                                matchLabels:
                                    app.kubernetes.io/instance: command-args-resources-production
                                    app.kubernetes.io/name: processor
                            topologyKey: kubernetes.io/hostname
                          weight: 1
            containers:
                - args:
                    - ./run.sh
                    - --verbose
                  command:
                    - /bin/sh
                    - -c
                  image: ghcr.io/acme/processor:1.0.0
                  imagePullPolicy: IfNotPresent
                  livenessProbe:
                    failureThreshold: 6
                    periodSeconds: 10
                    tcpSocket:
                        port: http
                    timeoutSeconds: 3
                  name: processor
                  ports:
                    - containerPort: 8080
                      name: http
                      protocol: TCP
                  readinessProbe:
                    failureThreshold: 3
                    periodSeconds: 5
                    tcpSocket:
                        port: http
                    timeoutSeconds: 3
                  resources:
                    limits: {}
                    requests:
                        cpu: 250m
                        memory: 256Mi
                  startupProbe:
                    failureThreshold: 36
                    periodSeconds: 5
                    tcpSocket:
                        port: http
                    timeoutSeconds: 3
            restartPolicy: Always
            serviceAccountName: default
