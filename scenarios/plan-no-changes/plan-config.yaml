# before.yaml and deployah.yaml are identical: the render is byte-for-byte
# the same resource set, so the plan must be empty. This also covers the
# "deploy twice" case (the second plan against an unchanged spec is
# empty); the deploy-time skip-on-no-op behavior itself is a separate
# integration concern tested elsewhere.
freshInstall: false

changes: []

summary:
  add: 0
  change: 0
  destroy: 0
