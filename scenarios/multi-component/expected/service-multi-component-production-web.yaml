apiVersion: v1
kind: Service
metadata:
    labels:
        app.kubernetes.io/instance: multi-component-production
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: web
        deployah.dev/component: web
        deployah.dev/environment: production
        deployah.dev/project: multi-component
        helm.sh/chart: web-0.1.0
    name: multi-component-production-web
    namespace: default
spec:
    ports:
        - name: http
          port: 80
          protocol: TCP
          targetPort: http
    selector:
        app.kubernetes.io/instance: multi-component-production
        app.kubernetes.io/name: web
    sessionAffinity: None
    type: ClusterIP
