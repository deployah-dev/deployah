# Raw manifest for the last *successful* release (revision 7), shaped the
# way Helm's release storage actually looks: it carries the bookkeeping
# fields a live/stored object has (resourceVersion, uid, generation,
# creationTimestamp, managedFields, status, and Helm/kubectl noise
# annotations) that normalizeResource must strip before diffing, and
# nothing here should be confused with a real spec-driven change. A later,
# failed revision 8 upgrade attempt is not represented here at all: the
# plan compares against this last-good manifest, not the failed one, so
# the fix in deployah.yaml is the only field difference.
