apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app.kubernetes.io/instance: autoscaling-hpa-production
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: api
        deployah.dev/component: api
        deployah.dev/environment: production
        deployah.dev/project: autoscaling-hpa
        helm.sh/chart: api-0.1.0
    name: autoscaling-hpa-production-api
    namespace: default
spec:
    revisionHistoryLimit: 10
    selector:
        matchLabels:
            app.kubernetes.io/instance: autoscaling-hpa-production
            app.kubernetes.io/name: api
    strategy:
        type: RollingUpdate
    template:
        metadata:
            annotations: null
            labels:
                app.kubernetes.io/instance: autoscaling-hpa-production
                app.kubernetes.io/managed-by: Helm
                app.kubernetes.io/name: api
                deployah.dev/component: api
                deployah.dev/environment: production
                deployah.dev/project: autoscaling-hpa
                helm.sh/chart: api-0.1.0
        spec:
            affinity:
                podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - podAffinityTerm:
                            labelSelector:
                                matchLabels:
                                    app.kubernetes.io/instance: autoscaling-hpa-production
                                    app.kubernetes.io/name: api
                            topologyKey: kubernetes.io/hostname
                          weight: 1
            containers:
                - image: ghcr.io/acme/api:2.3.1
                  imagePullPolicy: IfNotPresent
                  livenessProbe:
                    failureThreshold: 6
                    periodSeconds: 10
                    tcpSocket:
                        port: http
                    timeoutSeconds: 3
                  name: api
                  ports:
                    - containerPort: 8080
                      name: http
                      protocol: TCP
                  readinessProbe:
                    failureThreshold: 3
                    periodSeconds: 5
                    tcpSocket:
                        port: http
                    timeoutSeconds: 3
                  resources:
                    limits: {}
                    requests:
                        cpu: 500m
                        ephemeral-storage: 50Mi
                        memory: 512Mi
                  startupProbe:
                    failureThreshold: 36
                    periodSeconds: 5
                    tcpSocket:
                        port: http
                    timeoutSeconds: 3
            restartPolicy: Always
            serviceAccountName: default
