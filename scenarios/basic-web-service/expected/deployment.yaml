apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-web-service-dev
  labels:
    deployah.dev/project: basic-web-service
    deployah.dev/component: web
    deployah.dev/environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      deployah.dev/project: basic-web-service
      deployah.dev/component: web
      deployah.dev/environment: dev
  template:
    metadata:
      labels:
        deployah.dev/project: basic-web-service
        deployah.dev/component: web
        deployah.dev/environment: dev
    spec:
      containers:
      - name: web
        image: nginx:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
