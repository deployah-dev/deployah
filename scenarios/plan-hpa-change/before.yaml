# $schema: ../../internal/spec/schema/v1-alpha.2/manifest.json
apiVersion: v1-alpha.2
project: plan-hpa-change
components:
  api:
    image: ghcr.io/acme/api:1.0.0
    port: 8080
    resourcePreset: small
    environments: [production]
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      metrics:
        - type: cpu
          target: 75
environments:
  production: {}
