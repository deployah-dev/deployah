name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 3221225472
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Validate flake
        run: nix flake check --no-build

  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock', 'nix/**', 'go.mod', 'go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 3221225472
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Build flake
        id: build
        run: |
          set -o pipefail
          nix build .#default --print-build-logs 2>&1 | tee build.log

      - name: Surface vendorHash fix on mismatch
        if: failure() && steps.build.outcome == 'failure'
        run: |
          if ! grep -q "hash mismatch in fixed-output derivation" build.log; then
            exit 0
          fi
          NEW_HASH=$(
            grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' build.log \
              | head -1 | awk '{print $NF}'
          )
          {
            echo "## vendorHash is stale"
            echo ""
            echo "Go dependencies changed but \`deployahVendorHash\` in \`flake.nix\` was not updated."
            echo ""
            echo "Update \`flake.nix\`:"
            echo ""
            echo '```nix'
            echo "deployahVendorHash = \"${NEW_HASH}\";"
            echo '```'
            echo ""
            echo "Or run: \`nix run .#update-vendor-hash\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error file=flake.nix::deployahVendorHash is stale — update to ${NEW_HASH}"

  check:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        check: [tidy, lint, fmt, lint-md, update-vendor-hash]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 3221225472
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Run ${{ matrix.check }}
        run: nix run .#${{ matrix.check }}

      - name: Verify no uncommitted changes
        if: matrix.check == 'tidy' || matrix.check == 'fmt' || matrix.check == 'update-vendor-hash'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Run 'nix run .#${{ matrix.check }}' and commit changes"
            git diff
            exit 1
          fi

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 3221225472
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Run unit tests with race detector
        run: nix run .#test-unit

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-unit.out
          retention-days: 1

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 3221225472
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Run integration tests with race detector
        run: nix run .#test-integration

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: coverage-integration.out
          retention-days: 1

  report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    if: always() && needs.unit-test.result == 'success' && needs.integration-test.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download unit test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit

      - name: Download integration test coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-integration

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          fail_ci_if_error: true
          files: ./coverage-unit.out
          flags: unittests
          name: deployah-unit
          disable_search: true

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          fail_ci_if_error: true
          files: ./coverage-integration.out
          flags: integration
          name: deployah-integration
          disable_search: true
