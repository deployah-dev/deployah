name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: deployah/deployah
          # 'latest' only on stable tags (no pre-release suffix like -alpha, -beta, -rc)
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=edge,branch=${{ github.event.repository.default_branch }}
          flavor: |
            latest=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
            max-parallelism = 10

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/bake-action@v6
        with:
          targets: artifact
          provenance: false

      - name: Move artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          find ./dist -type f -not -name "SHA256SUMS" -exec mv {} ./dist/ \;
          find ./dist -name "SHA256SUMS" -exec cat {} \; | sort -u > ./dist/SHA256SUMS.combined
          mv ./dist/SHA256SUMS.combined ./dist/SHA256SUMS
          find ./dist -type d -empty -delete

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: deployah-artifacts
          path: ./dist/*
          if-no-files-found: error

      - name: Build and push image
        uses: docker/bake-action@v6
        with:
          targets: image
          push: true
          sbom: true
          provenance: true
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}

      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        if: github.ref_name == github.event.repository.default_branch
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          short-description: ${{ github.event.repository.description }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256sum
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
